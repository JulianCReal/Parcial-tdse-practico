<!DOCTYPE html>
<html>
<head>
    <title>Catalan</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<h1>Calculo Catalan</h1>
<form action="/catalan">
    <label for="number">Number:</label><br>
    <input type="number" id="number" name="number" value="number"><br><br>
    <input type="button" value="Calcular" onclick="calculateCatalan()">
</form>
<div id="respuesta"></div>
<script>
    function calculateCatalan() {
    let number = document.getElementById("number").value;
    const xhttp = new XMLHttpRequest();
    xhttp.onload = function() {
    document.getElementById("respuesta").innerHTML =
    this.responseText;
    }
    xhttp.open("GET", "http://ipaws/catalan?number="+number);
    xhttp.send();
    }
</script>
</body>
</html>
